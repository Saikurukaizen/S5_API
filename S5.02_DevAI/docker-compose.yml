version: '3.9'

services:
  backend:
    build:
      context: ./S5.01_API_REST/fitbit_api
      dockerfile: Dockerfile
    container_name: fitbit_backend
    ports:
      - "8000:80"
    env_file:
      - ./S5.01_API_REST/fitbit_api/.env
    volumes:
      - ./S5.01_API_REST/fitbit_api:/var/www/html
    depends_on:
      - db

  db:
    image: mysql:8
    container_name: fitbit_db
    restart: always
    environment:
      MYSQL_DATABASE: fitbit
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: fitbit_user
      MYSQL_PASSWORD: fitbit_pass
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: fitbit_frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000/api
      - CHOKIDAR_USEPOLLING=true
    volumes:
      - ./frontend:/app
      - /app/node_modules
    stdin_open: true
    tty: true
    depends_on:
      - backend

volumes:
  db_data:
