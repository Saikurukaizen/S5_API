<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FitBit CYBER - Future Fitness Tracker</title>
    
    <!-- Cyberpunk Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Exo+2:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
      /* Preload critical cyberpunk styles */
      body { 
        margin: 0; 
        background: #000008; 
        color: #00ffff; 
        font-family: 'Orbitron', monospace;
        overflow-x: hidden;
      }
      
      /* Loading animation */
      #loading {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: #000008;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        color: #00ffff;
        font-family: 'Orbitron', monospace;
        font-size: 24px;
        text-shadow: 0 0 20px #00ffff;
      }
      
      #loading::after {
        content: '●●●';
        animation: loading-dots 1.5s infinite;
      }
      
      @keyframes loading-dots {
        0%, 20% { content: '●○○'; }
        40% { content: '●●○'; }
        60%, 100% { content: '●●●'; }
      }
    </style>
  </head>
  <body>
    <div id="loading">INITIALIZING FITBIT CYBER</div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Remove loading screen once app loads
      window.addEventListener('load', () => {
        setTimeout(() => {
          const loading = document.getElementById('loading');
          if (loading) {
            loading.style.opacity = '0';
            loading.style.transition = 'opacity 0.5s';
            setTimeout(() => loading.remove(), 500);
          }
        }, 1000);
      });
    </script>
  </body>
</html>
