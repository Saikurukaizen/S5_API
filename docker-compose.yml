services:
  db:
    image: mysql:8
    container_name: fitbit_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: fitbit
      MYSQL_USER: fitbit_user
      MYSQL_PASSWORD: fitbit_pass
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  php:
    build:
      context: ./S5.01_API_REST/fitbit_api
      dockerfile: Dockerfile
    container_name: fitbit_php
    working_dir: /var/www/html
    volumes:
      - ./S5.01_API_REST/fitbit_api:/var/www/html:cached
    env_file:
      - ./S5.01_API_REST/fitbit_api/.env
    depends_on:
      - db
    expose:
      - "8000"

  nginx:
    image: nginx:1.27-alpine
    container_name: fitbit_nginx
    restart: always
    ports:
      - "8000:80"
    volumes:
      - ./S5.01_API_REST/fitbit_api:/var/www/html:ro
      - ./S5.01_API_REST/fitbit_api/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php

  frontend:
    build:
      context: ./S5.02_DevAI/frontend
      dockerfile: Dockerfile
    container_name: fitbit_frontend
    restart: always
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE_URL=http://localhost:8000/api/v1
      - VITE_HOST=0.0.0.0
      - CHOKIDAR_USEPOLLING=true
    volumes:
      - ./S5.02_DevAI/frontend:/app:cached
      - /app/node_modules
    stdin_open: true
    tty: true
    depends_on:
      - nginx

volumes:
  db_data: